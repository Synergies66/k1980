name:婢抽棬鏂伴椈鎶撳彇
on:
  schedule:
    - cron: '15 */4 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser beautifulsoup4
      - name: 脙娄脗聤脗聯脙楼脗聫脗聳脙娄脗戮脗鲁脙漏脗聴脗篓
        timeout-minutes: 3
        run: timeout 150 python scripts/scrape_region.py mo 2>/dev/null || echo "脙篓脗路脗鲁脙篓脗驴脗聡"
      - name: 脙娄脗聫脗聬脙陇脗潞脗陇
        run: |
          git config --global user.name "K1980 Bot"
          git config --global user.email "bot@k1980.com"
          git add data/
          git diff --staged --quiet || (git commit -m "脙掳脗聼脗聯脗掳 脙娄脗戮脗鲁脙漏脗聴脗篓脙娄脗聲脗掳脙娄脗聧脗庐脙娄脗聸脗麓脙娄脗聳脗掳 $(date '+%Y-%m-%d %H:%M')" && git fetch origin main && git reset --hard HEAD && git pull origin main --strategy=ours --no-rebase 2>/dev/null || true && git push origin main --force-with-lease)
