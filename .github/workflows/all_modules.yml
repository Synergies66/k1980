name: 📰 K1980 内容引擎（统一）
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  fetch-all:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install httpx supabase anthropic requests feedparser beautifulsoup4
          cp core_engine.py fetchers/core_engine.py
          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: 时事模块
        continue-on-error: true
        timeout-minutes: 3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetchers/fetch_news.py 2>/dev/null || echo "时事模块跳过"

      - name: 移民模块
        continue-on-error: true
        timeout-minutes: 3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetchers/fetch_immigration.py 2>/dev/null || echo "移民模块跳过"

      - name: 科技模块
        continue-on-error: true
        timeout-minutes: 3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetchers/fetch_tech.py 2>/dev/null || echo "科技模块跳过"

      - name: 财经模块
        continue-on-error: true
        timeout-minutes: 3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetchers/fetch_finance.py 2>/dev/null || echo "财经模块跳过"

      - name: 教育模块
        continue-on-error: true
        timeout-minutes: 3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetchers/fetch_education.py 2>/dev/null || echo "教育模块跳过"

      - name: 生活模块
        continue-on-error: true
        timeout-minutes: 3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetchers/fetch_lifestyle.py 2>/dev/null || echo "生活模块跳过"

      - name: 旅游模块
        continue-on-error: true
        timeout-minutes: 3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetchers/fetch_travel.py 2>/dev/null || echo "旅游模块跳过"

      - name: AI原创内容生成
        continue-on-error: true
        timeout-minutes: 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_biz_insights.py 2>/dev/null || echo "AI生成跳过"
