name: 生成文章页面

on:
  schedule:
    - cron: '30 */4 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install httpx
      - name: 生成页面
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/generate_article_pages.py
      - name: 提交页面
        run: |
          git config --global user.name "K1980 Bot"
          git config --global user.email "bot@k1980.app"
          git add news/ sitemap.xml
          git diff --staged --quiet || git commit -m "📄 更新文章页面 $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase
          git push
