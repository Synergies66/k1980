name: 🇺🇸 美国本地模块

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape-us:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install feedparser beautifulsoup4 requests
      - run: python scripts/scrape_region.py us
      - run: |
          git config --global user.name "K1980 Bot"
          git config --global user.email "bot@k1980.app"
          git add data/news_us.json data/services_us.json
          git diff --staged --quiet || git commit -m "🇺🇸 美国数据更新 $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase
          git push
