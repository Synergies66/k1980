name: 新西兰新闻抓取

on:
  schedule:
    - cron: '15 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests feedparser beautifulsoup4

      - name: 抓取新西兰新闻
        timeout-minutes: 3
        run: timeout 150 python scripts/scrape_region.py nz 2>/dev/null || echo "抓取完成"

      - name: Upload data via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATA_FILE: data/news_nz.json
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, base64, urllib.request, urllib.error, time
          token    = os.environ["GH_TOKEN"]
          repo     = os.environ["REPO"]
          filepath = os.environ["DATA_FILE"]
          api_url  = f"https://api.github.com/repos/{repo}/contents/{filepath}"
          headers  = {
              "Authorization": f"token {token}",
              "Accept":        "application/vnd.github+json",
              "Content-Type":  "application/json",
          }
          with open(filepath, "r", encoding="utf-8") as f:
              raw = f.read()
          encoded = base64.b64encode(raw.encode()).decode()
          for attempt in range(1, 6):
              req = urllib.request.Request(api_url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as r:
                      sha = json.loads(r.read()).get("sha", "")
              except urllib.error.HTTPError as e:
                  sha = "" if e.code == 404 else (_ for _ in ()).throw(e)
              payload = {"message": f"chore: update {filepath} [skip ci]", "content": encoded}
              if sha:
                  payload["sha"] = sha
              req2 = urllib.request.Request(api_url, data=json.dumps(payload).encode(), headers=headers, method="PUT")
              try:
                  with urllib.request.urlopen(req2) as r:
                      print(f"✅ 上传成功 (attempt {attempt})")
                      break
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  if e.code == 409 and attempt < 5:
                      time.sleep(3 * attempt)
                  else:
                      raise
          PYEOF
