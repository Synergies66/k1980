name: 횄짝횂혡횂혫횄짜횂혧횂혯횄짝횂혯횂째횄짢횂짜횂쩔횄짜횂혚횂째횄짝횂혮횂째횄짝횂혥횂짰
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser beautifulsoup4
      - name: 횄짝횂혡횂혫횄짜횂혧횂혯횄짝횂혯횂째횄짢횂짜횂쩔횄짜횂혚횂째
        timeout-minutes: 3
        run: timeout 150 python scripts/scrape_region.py nz 2>/dev/null || echo "횄짢횂쨌횂쨀횄짢횂쩔횂혝"
      - name: 횄짝횂혧횂혨횄짚횂쨘횂짚
        run: |
          git config --global user.name "K1980 Bot"
          git config --global user.email "bot@k1980.com"
          git add data/
          git diff --staged --quiet || (git commit -m "횄째횂혺횂혫횂째 횄짝횂혯횂째횄짢횂짜횂쩔횄짜횂혚횂째횄짝횂혮횂째횄짝횂혥횂짰횄짝횂혴횂쨈횄짝횂혯횂째 $(date '+%Y-%m-%d %H:%M')" && git fetch origin main && git reset --hard HEAD && git pull origin main --strategy=ours --no-rebase 2>/dev/null || true && git push origin main --force-with-lease)
