name: 챈혡혫책혧혯챈혯째챔짜쩔책혚째챈혮째챈혥짰
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser beautifulsoup4
      - name: 챈혡혫책혧혯챈혯째챔짜쩔책혚째
        timeout-minutes: 3
        run: timeout 150 python scripts/scrape_region.py nz 2>/dev/null || echo "챔쨌쨀챔쩔혝"
      - name: 챈혧혨채쨘짚
        run: |
          git config --global user.name "K1980 Bot"
          git config --global user.email "bot@k1980.com"
          git add data/
          git diff --staged --quiet || (git commit -m "챨혺혫째 챈혯째챔짜쩔책혚째챈혮째챈혥짰챈혴쨈챈혯째 $(date '+%Y-%m-%d %H:%M')" && git fetch origin main && git reset --hard HEAD && git pull origin main --strategy=ours --no-rebase 2>/dev/null || true && git push origin main --force-with-lease)
