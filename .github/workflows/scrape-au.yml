name: 澳大利亚新闻抓取
on:
  schedule:
    - cron: '5 */4 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser beautifulsoup4
      - name: 抓取澳大利亚新闻抓取
        timeout-minutes: 3
        run: timeout 150 python scripts/scrape_region.py au 2>/dev/null || echo "抓取完成"

      - name: Upload data via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATA_FILE: data/news_au.json
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF2'
          import os,json,base64,urllib.request,urllib.error,time
          token=os.environ["GH_TOKEN"];repo=os.environ["REPO"];filepath=os.environ["DATA_FILE"]
          if not os.path.exists(filepath):print(f"⚠️ {filepath} 不存在");exit(0)
          api_url=f"https://api.github.com/repos/{repo}/contents/{filepath}"
          headers={"Authorization":f"token {token}","Accept":"application/vnd.github+json","Content-Type":"application/json"}
          with open(filepath,"r",encoding="utf-8") as f:encoded=base64.b64encode(f.read().encode()).decode()
          for attempt in range(1,6):
            req=urllib.request.Request(api_url,headers=headers)
            try:
              with urllib.request.urlopen(req) as r:sha=json.loads(r.read()).get("sha","")
            except urllib.error.HTTPError as e:
              sha="" if e.code==404 else (_ for _ in ()).throw(e)
            payload={"message":f"chore: update {filepath} [skip ci]","content":encoded}
            if sha:payload["sha"]=sha
            req2=urllib.request.Request(api_url,data=json.dumps(payload).encode(),headers=headers,method="PUT")
            try:
              with urllib.request.urlopen(req2) as r:print(f"✅ 上传成功 attempt {attempt}");break
            except urllib.error.HTTPError as e:
              if e.code==409 and attempt<5:time.sleep(3*attempt)
              else:raise
          PYEOF2
