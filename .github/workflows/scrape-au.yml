name: 🇦🇺 澳洲本地模块

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape-au:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install feedparser beautifulsoup4 requests
      - run: python scripts/scrape_region.py au
      - run: |
          git config --global user.name "K1980 Bot"
          git config --global user.email "bot@k1980.app"
          git add data/news_au.json data/services_au.json
          git diff --staged --quiet || git commit -m "🇦🇺 澳洲数据更新 $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase
          git push
