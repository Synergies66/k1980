name: 🦘 抓取澳大利亚数据
on:
  schedule:
    - cron: '30 */4 * * *'  # 每4小时，错开30分钟避免冲突
  workflow_dispatch:

jobs:
  scrape-au:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4

      - name: 抓取澳大利亚数据
        timeout-minutes: 2
        run: timeout 110 python scripts/scrape_region.py au 2>/dev/null || echo "AU 跳过"

      - name: 提交并推送
        run: |
          git config --global user.name "K1980 Bot"
          git config --global user.email "bot@k1980.com"
          git add data/
          if git diff --staged --quiet; then
            echo "✅ 无变更"
          else
            git commit -m "🦘 澳大利亚数据更新 $(date '+%Y-%m-%d %H:%M')"
            git pull origin main --rebase --strategy-option=theirs
            git push origin main
            echo "✅ 已推送"
          fi
