name: AI Content Update

on:
  schedule:
    - cron: '0 */2 * * *'   # 每2小时一次（比每小时更保守，节省 Actions 用量）
  workflow_dispatch:          # 支持手动触发

jobs:
  ai-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # 防止脚本卡死

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase requests

      - name: Run AI script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python generate_biz_insights.py
