name: 经纬专栏每日生成

on:
  schedule:
    # 每天 UTC 01:00（北京时间9点，新西兰时间13点/14点）
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  generate-jingwei:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 生成今日经纬专栏
        run: python scripts/generate_jingwei.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: 提交文章
        run: |
          git config --global user.name "K1980 Bot"
          git config --global user.email "bot@k1980.app"
          git add data/jingwei.json
          git diff --staged --quiet || git commit -m "📰 经纬专栏更新 $(date +'%Y-%m-%d')"
          git pull --rebase
          git push
