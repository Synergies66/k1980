name: 商业洞察每日生成

on:
  schedule:
    # 每天 UTC 00:30 运行（北京时间 8:30，新西兰时间 12:30/13:30）
    - cron: '30 0 * * *'
  workflow_dispatch:  # 支持手动触发测试

jobs:
  generate-insights:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: 生成今日商业洞察
        run: python scripts/generate_biz_insights.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 提交数据
        run: |
          git config --global user.name  "K1980 BizBot"
          git config --global user.email "bizbot@k1980.app"
          git add data/biz_insights.json
          git diff --staged --quiet || git commit -m "💡 商业洞察更新 $(date +'%Y-%m-%d')"
          git push
